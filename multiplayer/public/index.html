<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldMind</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922;
  --purple: #bc8cff;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; flex-shrink: 0; overflow-y: auto; }
.main { flex: 1; max-width: 680px; margin: 0 auto; padding: 16px; }
.right-panel { width: 300px; border-left: 1px solid var(--border); padding: 16px; flex-shrink: 0; overflow-y: auto; }

/* Header */
.header { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.header h1 { font-size: 20px; }
.header .round-badge { background: var(--accent); color: #000; padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
.header .status { margin-left: auto; font-size: 13px; color: var(--text2); }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 4px; }

/* Join panel */
.join-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; text-align: center; margin: 60px auto; max-width: 400px; }
.join-panel h2 { margin-bottom: 16px; }
.join-panel input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 15px; margin-bottom: 12px; }
.join-panel input:focus { outline: none; border-color: var(--accent); }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px; transition: all 0.15s; }
.btn:hover { border-color: var(--accent); }
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { opacity: 0.9; }
.btn-small { padding: 4px 10px; font-size: 12px; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }

/* Composer */
.composer { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
.composer textarea { width: 100%; background: transparent; border: none; color: var(--text); font-size: 14px; resize: vertical; min-height: 60px; font-family: inherit; }
.composer textarea:focus { outline: none; }
.composer-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.composer-actions select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 13px; }

/* Feed */
.feed-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.feed-item .author { font-weight: 600; color: var(--accent); }
.feed-item .meta { color: var(--text2); font-size: 12px; margin-left: 8px; }
.feed-item .content { margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
.feed-item .stats { margin-top: 8px; display: flex; gap: 16px; color: var(--text2); font-size: 13px; }
.feed-item .stats span { cursor: pointer; }
.feed-item .stats span:hover { color: var(--accent); }
.feed-item .comment-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.comment { font-size: 13px; padding: 4px 0; color: var(--text2); }
.comment .author { color: var(--purple); font-weight: 600; }

/* Agent list */
.agent-list h3 { font-size: 14px; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.agent-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 2px; font-size: 14px; cursor: pointer; }
.agent-item:hover { background: var(--bg); }
.agent-badge { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
.badge-npc { background: #1f2937; color: var(--text2); }
.badge-player { background: #0c2d1a; color: var(--green); }
.badge-you { background: #1a1a2e; color: var(--purple); }

/* Avatar */
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); }
.avatar-small { width: 24px; height: 24px; font-size: 12px; }

/* Notification panel */
.notif-panel { max-height: 200px; overflow-y: auto; margin-top: 16px; }
.notif-item { display: flex; gap: 8px; padding: 8px; border-radius: 6px; margin-bottom: 4px; font-size: 13px; background: var(--bg); }
.notif-item:hover { background: var(--surface); }
.notif-item .notif-icon { font-size: 14px; }
.notif-item .notif-text { color: var(--text2); }
.notif-item .notif-text strong { color: var(--text); }

/* Agent detail modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; align-items: center; justify-content: center; }
.modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 450px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.modal-header .avatar { width: 48px; height: 48px; font-size: 24px; }
.modal-close { margin-left: auto; cursor: pointer; font-size: 20px; color: var(--text2); }
.modal-close:hover { color: var(--text); }

/* Polls */
.poll-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.poll-card h4 { color: var(--accent); margin-bottom: 8px; }
.poll-option { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin: 4px 0; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
.poll-option:hover { border-color: var(--accent); }
.poll-option.voted { border-color: var(--green); background: rgba(63,185,80,0.1); }
.poll-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.poll-meta { font-size: 12px; color: var(--text2); margin-top: 6px; }

/* Events log */
.events { max-height: 200px; overflow-y: auto; font-size: 12px; color: var(--text2); }
.event-item { padding: 3px 0; border-bottom: 1px solid var(--border); }
.event-item.broadcast { color: var(--yellow); }

/* Notifications */
.toast { position: fixed; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--accent); padding: 12px 16px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease; max-width: 350px; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Responsive */
@media (max-width: 1100px) { .right-panel { display: none; } }
@media (max-width: 800px) { .sidebar { display: none; } .main { padding: 8px; } }

/* Tabs */
.tab-btn { opacity: 0.6; }
.tab-btn.active { opacity: 1; border-color: var(--accent); }

/* Group chat */
.group-item { padding: 10px; border-radius: 6px; margin-bottom: 6px; background: var(--bg); cursor: pointer; }
.group-item:hover { background: var(--surface); border: 1px solid var(--border); }
.group-msg { padding: 4px 0; font-size: 13px; }
.group-msg .sender { color: var(--accent); font-weight: 600; }

/* Mobile responsive */
@media (max-width: 768px) {
  #app { flex-direction: column !important; }
  .left-panel, .right-panel { 
    width: 100% !important; min-width: unset !important; max-width: unset !important;
    border-right: none !important; border-left: none !important;
    border-bottom: 1px solid var(--border);
    max-height: 200px !important; overflow-y: auto !important;
  }
  .left-panel { flex-direction: row !important; flex-wrap: wrap !important; gap: 4px !important; padding: 8px !important; }
  .left-panel h3 { display: none; }
  .left-panel hr { display: none; }
  .notif-panel, .events { display: none; }
  .agent-item { padding: 4px 6px !important; font-size: 12px !important; }
  .right-panel { max-height: 300px !important; }
  .feed-area { padding: 12px !important; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Join Screen -->
<div id="join-screen" class="join-panel">
  <div style="font-size:48px; margin-bottom:8px;">🌍</div>
  <h2 style="margin:0 0 8px;">WorldMind</h2>
  <p style="color: var(--text2); margin-bottom: 20px; line-height:1.5; max-width:300px; text-align:center;">与 AI 角色一起生活在模拟社交世界中<br>发帖、互动、投票、加入群聊</p>
  <input id="join-name" placeholder="输入你的名字" maxlength="20" autofocus onkeydown="if(event.key==='Enter')doJoin()">
  <br>
  <button class="btn btn-primary" onclick="doJoin()" style="width:100%">🚀 加入世界</button>
  <div id="join-error" style="color: var(--red); margin-top: 8px; font-size: 13px;"></div>
  <p style="color:var(--text2); font-size:11px; margin-top:16px; opacity:0.6;">WorldMind — 多 Agent 世界模型引擎</p>
</div>

<!-- Main App (hidden until join) -->
<div id="app" class="app" style="display:none">
  <!-- Left sidebar: agents -->
  <div class="sidebar">
    <div class="agent-list">
      <h3>🧑‍🤝‍🧑 角色</h3>
      <div id="agent-list"></div>
    </div>
    <hr style="border-color: var(--border); margin: 16px 0;">
    <div>
      <h3 style="font-size:14px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">🔔 通知</h3>
      <div id="notifications" class="notif-panel"><p style="color:var(--text2); font-size:13px;">暂无通知</p></div>
    </div>
    <hr style="border-color: var(--border); margin: 16px 0;">
    <div>
      <h3 style="font-size:14px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">📢 事件</h3>
      <div id="events" class="events"></div>
    </div>
  </div>

  <!-- Center: feed -->
  <div class="main">
    <div class="header">
      <h1>🌍 WorldMind</h1>
      <span class="round-badge" id="round-badge">Round 0</span>
      <span class="status"><span class="status-dot" id="status-dot"></span><span id="status-text">已连接</span></span>
    </div>

    <!-- Composer -->
    <div class="composer">
      <textarea id="compose-text" placeholder="说点什么..."></textarea>
      <div class="composer-actions">
        <select id="compose-action">
          <option value="post">📝 发帖</option>
          <option value="comment">💬 评论</option>
          <option value="like">❤️ 点赞</option>
          <option value="follow">➕ 关注</option>
          <option value="repost">🔁 转发</option>
          <option value="quote">💬 引用</option>
        </select>
        <input id="compose-target" type="number" placeholder="帖子/用户 ID" style="width:100px; padding:6px 8px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:13px;">
        <button class="btn btn-primary" onclick="doAction()">发送</button>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>
    <div id="new-posts-banner" style="display:none; position:sticky; top:0; z-index:10; text-align:center; padding:8px; background:var(--accent); color:#000; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; margin-bottom:8px;" onclick="loadFeed(); this.style.display='none';">
      📢 有新帖子，点击刷新
    </div>
    <button class="btn" onclick="loadFeed()" style="width:100%; margin-top:8px;">🔄 刷新 Feed</button>
  </div>

  <!-- Right panel: tabs (polls + groups) -->
  <div class="right-panel">
    <div style="display:flex; gap:4px; margin-bottom:12px;">
      <button class="btn btn-small tab-btn active" data-tab="polls" onclick="switchTab('polls')">📊 投票</button>
      <button class="btn btn-small tab-btn" data-tab="groups" onclick="switchTab('groups')">💬 群聊</button>
    </div>
    <div id="tab-polls">
      <button class="btn btn-small" onclick="showCreatePoll()" style="margin-bottom:10px;">+ 发起投票</button>
      <div id="polls"></div>
    </div>
    <div id="tab-groups" style="display:none;">
      <div id="group-list"></div>
      <div id="group-chat" style="display:none; margin-top:12px;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
          <button class="btn btn-small" onclick="closeGroupChat()">← 返回</button>
          <span id="group-chat-name" style="font-weight:600;"></span>
        </div>
        <div id="group-messages" style="max-height:300px; overflow-y:auto;"></div>
        <div style="display:flex; gap:6px; margin-top:8px;">
          <input id="group-msg-input" placeholder="发消息..." style="flex:1; padding:6px 8px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:13px;">
          <button class="btn btn-small btn-primary" onclick="sendGroupMsg()">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Poll Modal -->
<div id="poll-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:999; display:none; align-items:center; justify-content:center;">
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px; max-width:420px; width:90%;">
    <h3 style="margin-bottom:12px;">发起投票</h3>
    <input id="poll-question" placeholder="投票问题" style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; margin-bottom:12px;">
    <div id="poll-options-edit"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn btn-primary" id="poll-confirm-btn" onclick="confirmPoll()" style="display:none;">确认发布</button>
      <button class="btn" onclick="generatePollOptions()">生成选项</button>
      <button class="btn" onclick="closePollModal()">取消</button>
    </div>
  </div>
</div>

<!-- Agent Detail Modal -->
<div id="agent-modal" class="modal-overlay" onclick="if(event.target===this)closeAgentModal()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="avatar" id="modal-avatar"></div>
      <div>
        <div style="font-weight:600; font-size:16px;" id="modal-name"></div>
        <div style="color:var(--text2); font-size:13px;" id="modal-handle"></div>
      </div>
      <span class="modal-close" onclick="closeAgentModal()">✕</span>
    </div>
    <div style="margin-bottom:12px;">
      <span class="agent-badge" id="modal-badge"></span>
    </div>
    <div style="color:var(--text2); font-size:14px; line-height:1.6;" id="modal-personality"></div>
    <div style="margin-top:16px; display:flex; gap:8px;" id="modal-actions"></div>
  </div>
</div>

<script>
const BASE = location.origin;
let TOKEN = null;
let MY_ID = null;
let MY_NAME = null;
let WS = null;
let POLL_DRAFT_ID = null;
let AGENTS = [];
let NOTIFS = [];

// ─── Emoji Avatar System ─────────────────────────
const AVATAR_EMOJIS = [
  '🦁','🐯','🐻','🦊','🐼','🐨','🐸','🦄','🐲','🦅',
  '🐧','🦈','🐙','🦋','🌸','⚡','🔥','💎','🌙','🎭',
  '🤖','👻','🎪','🌊','🍀','🎯','🎲','🪐','🌈','❄️',
];
const agentAvatarMap = {};

function getAvatar(agentId, username) {
  if (agentAvatarMap[agentId]) return agentAvatarMap[agentId];
  // Hash username to pick a stable emoji
  let hash = 0;
  for (let i = 0; i < (username||'').length; i++) hash = ((hash << 5) - hash + username.charCodeAt(i)) | 0;
  const emoji = AVATAR_EMOJIS[Math.abs(hash) % AVATAR_EMOJIS.length];
  agentAvatarMap[agentId] = emoji;
  return emoji;
}

function avatarHtml(agentId, username, small) {
  const cls = small ? 'avatar avatar-small' : 'avatar';
  return `<div class="${cls}">${getAvatar(agentId, username)}</div>`;
}

// ─── Agent Detail Modal ──────────────────────────
function showAgentModal(agentId) {
  const a = AGENTS.find(x => x.id === agentId);
  if (!a) return;
  document.getElementById('modal-avatar').textContent = getAvatar(a.id, a.username);
  document.getElementById('modal-name').textContent = a.displayName || a.username;
  document.getElementById('modal-handle').textContent = `@${a.username} · #${a.id}`;
  const badge = document.getElementById('modal-badge');
  if (a.id === MY_ID) { badge.className = 'agent-badge badge-you'; badge.textContent = '你'; }
  else if (a.type === 'npc') { badge.className = 'agent-badge badge-npc'; badge.textContent = 'NPC'; }
  else { badge.className = 'agent-badge badge-player'; badge.textContent = '玩家'; }
  document.getElementById('modal-personality').textContent = a.personality || '暂无简介';

  const actions = document.getElementById('modal-actions');
  if (a.id !== MY_ID) {
    actions.innerHTML = `<button class="btn btn-small" onclick="quickAction('follow',${a.id});closeAgentModal();">➕ 关注</button>`;
  } else {
    actions.innerHTML = '';
  }
  document.getElementById('agent-modal').style.display = 'flex';
}

function closeAgentModal() {
  document.getElementById('agent-modal').style.display = 'none';
}

// ─── Notifications ───────────────────────────────
async function loadNotifications() {
  try {
    const r = await api('GET', `/api/notifications?token=${TOKEN}&limit=20`);
    const items = r.notifications || [];
    const el = document.getElementById('notifications');
    if (items.length === 0) {
      el.innerHTML = '<p style="color:var(--text2); font-size:13px;">暂无通知</p>';
      return;
    }
    el.innerHTML = items.map(n => {
      let icon = '📌';
      if (n.type === 'comment') icon = '💬';
      else if (n.type === 'follow') icon = '👤';
      else if (n.type === 'like') icon = '❤️';
      else if (n.type === 'repost') icon = '🔁';
      else if (n.type === 'mention') icon = '📣';
      return `<div class="notif-item">
        <span class="notif-icon">${icon}</span>
        <span class="notif-text"><strong>${esc(n.from_agent || n.fromAgent || '')}</strong> ${esc(n.content || n.type)}</span>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('loadNotifications:', e);
  }
}

// ─── Join ────────────────────────────────────────
async function doJoin() {
  const name = document.getElementById('join-name').value.trim();
  if (!name) return;
  try {
    const r = await api('POST', '/api/join', { name });
    TOKEN = r.token;
    MY_ID = r.playerId;
    MY_NAME = name;
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    if (r.round != null) document.getElementById('round-badge').textContent = `Round ${r.round}`;
    connectWS();
    loadAgents();
    loadFeed();
    loadPolls();
    loadNotifications();
    loadState();
    startPolling();
  } catch (e) {
    document.getElementById('join-error').textContent = e.message || '加入失败';
  }
}

document.getElementById('join-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') doJoin();
});

// ─── WebSocket ───────────────────────────────────
function connectWS() {
  const wsUrl = `ws://${location.host}`;
  WS = new WebSocket(wsUrl);
  WS.onopen = () => {
    // Authenticate with existing HTTP token instead of joining again
    WS.send(JSON.stringify({ type: 'auth', token: TOKEN, name: MY_NAME }));
    setStatus('connected');
  };
  WS.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWSMessage(msg);
  };
  WS.onclose = () => setStatus('disconnected');
  WS.onerror = () => setStatus('error');
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      break;
    case 'joined':
      if (msg.round != null) document.getElementById('round-badge').textContent = `Round ${msg.round}`;
      break;
    case 'round_start':
      document.getElementById('round-badge').textContent = `Round ${msg.round}`;
      addEvent(`🔄 Round ${msg.round} 开始`);
      break;
    case 'round_end':
      // Show banner instead of auto-refresh (less jarring while reading)
      document.getElementById('new-posts-banner').style.display = 'block';
      loadPolls();
      loadNotifications();
      loadAgents();
      addEvent(`✅ Round 结束`);
      break;
    case 'event':
      if (msg.event === 'round_start') {
        const rd = msg.data?.round;
        if (rd != null) document.getElementById('round-badge').textContent = `Round ${rd}`;
        addEvent(`🔄 Round ${rd} 开始`);
        return;
      } else if (msg.event === 'round_end') {
        document.getElementById('new-posts-banner').style.display = 'block';
        loadPolls();
        loadNotifications();
        loadAgents();
        addEvent(`✅ Round 结束`);
        return;
      } else if (msg.event === 'system_broadcast') {
        showToast(`📢 ${msg.data.message}`);
        addEvent(msg.data.message, 'broadcast');
      } else if (msg.event === 'poll_created') {
        loadPolls();
        showToast(`📊 新投票: ${msg.data.question}`);
      } else if (msg.event === 'poll_closed') {
        loadPolls();
      } else if (msg.event === 'poll_vote') {
        loadPolls();
      } else if (msg.event === 'kicked') {
        showToast('❌ 你被管理员踢出了');
        setTimeout(() => location.reload(), 2000);
      }
      break;
  }
}

function setStatus(s) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (s === 'connected') { dot.style.background = 'var(--green)'; text.textContent = '已连接'; }
  else if (s === 'disconnected') { dot.style.background = 'var(--red)'; text.textContent = '已断开'; }
  else { dot.style.background = 'var(--yellow)'; text.textContent = '连接中...'; }
}

// ─── Feed ────────────────────────────────────────
async function loadFeed() {
  try {
    const r = await api('GET', `/api/feed?token=${TOKEN}&limit=20`);
    const el = document.getElementById('feed');
    if (!r.feed || r.feed.length === 0) {
      el.innerHTML = '<p style="color:var(--text2); text-align:center; padding:20px;">暂无内容，等待第一轮...</p>';
      return;
    }
    el.innerHTML = r.feed.map(item => {
      const authorAgent = AGENTS.find(a => a.id === item.authorId);
      const authorDisplay = authorAgent?.displayName || item.authorName;
      const comments = (item.commentList || []).map(c => {
        const cAgent = AGENTS.find(a => (a.displayName||a.username) === c.authorName || a.username === c.authorName);
        return `<div class="comment" style="display:flex; gap:6px; align-items:flex-start;">
          ${cAgent ? avatarHtml(cAgent.id, cAgent.username, true) : '<div class="avatar avatar-small">💬</div>'}
          <div><span class="author">${esc(c.authorName)}</span> ${esc(c.content)}</div>
        </div>`;
      }).join('');
      return `<div class="feed-item">
        <div style="display:flex; gap:10px; align-items:flex-start;">
          ${avatarHtml(item.authorId, item.authorName)}
          <div style="flex:1; min-width:0;">
            <div>
              <span class="author" style="cursor:pointer;" onclick="showAgentModal(${item.authorId})">${esc(authorDisplay)}</span>
              <span class="meta">@${esc(item.authorName)} · #${item.postId}</span>
            </div>
            <div class="content">${esc(item.content)}</div>
            <div class="stats">
              <span onclick="quickAction('like',${item.postId})">❤️ ${item.likes}</span>
              <span onclick="quickAction('comment',${item.postId})">💬 ${item.comments}</span>
              <span onclick="quickAction('repost',${item.postId})">🔁 ${item.reposts || 0}</span>
            </div>
            ${comments ? `<div class="comment-list">${comments}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('loadFeed:', e);
  }
}

function quickAction(action, targetId) {
  if (action === 'like') {
    api('POST', '/api/action', { token: TOKEN, action: 'like', targetPostId: targetId });
    showToast('❤️ 已点赞');
  } else if (action === 'comment') {
    document.getElementById('compose-action').value = 'comment';
    document.getElementById('compose-target').value = targetId;
    document.getElementById('compose-text').focus();
  } else if (action === 'repost') {
    api('POST', '/api/action', { token: TOKEN, action: 'repost', targetPostId: targetId });
    showToast('🔁 已转发');
  } else if (action === 'follow') {
    api('POST', '/api/action', { token: TOKEN, action: 'follow', targetUserId: targetId });
    showToast('➕ 已关注');
  }
}

// ─── Actions ─────────────────────────────────────
async function doAction() {
  const action = document.getElementById('compose-action').value;
  const content = document.getElementById('compose-text').value.trim();
  const target = parseInt(document.getElementById('compose-target').value) || undefined;

  if ((action === 'post' || action === 'comment' || action === 'quote') && !content) return;

  const body = { token: TOKEN, action };
  if (content) body.content = content;
  if (target && ['comment', 'like', 'repost', 'quote'].includes(action)) body.targetPostId = target;
  if (target && action === 'follow') body.targetUserId = target;

  try {
    await api('POST', '/api/action', body);
    document.getElementById('compose-text').value = '';
    document.getElementById('compose-target').value = '';
    showToast('✅ 已发送');
    setTimeout(loadFeed, 1000);
  } catch (e) {
    showToast('❌ ' + (e.message || '发送失败'));
  }
}

// ─── Agents ──────────────────────────────────────
async function loadAgents() {
  try {
    const r = await api('GET', '/api/agents');
    AGENTS = r.agents || [];
    const el = document.getElementById('agent-list');
    el.innerHTML = AGENTS.map(a => {
      let badge = a.type === 'npc'
        ? '<span class="agent-badge badge-npc">NPC</span>'
        : a.id === MY_ID
          ? '<span class="agent-badge badge-you">你</span>'
          : '<span class="agent-badge badge-player">玩家</span>';
      const name = a.displayName || a.username;
      return `<div class="agent-item" onclick="showAgentModal(${a.id})">
        ${avatarHtml(a.id, a.username, true)}
        ${badge}
        <span>${esc(name)}</span>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('loadAgents:', e);
  }
}

// ─── Polls ───────────────────────────────────────
async function loadPolls() {
  try {
    const r = await api('GET', '/api/poll/list');
    const el = document.getElementById('polls');
    if (!r.polls || r.polls.length === 0) {
      el.innerHTML = '<p style="color:var(--text2); font-size:13px;">暂无投票</p>';
      return;
    }
    // Get results for active polls
    let html = '';
    for (const p of r.polls) {
      let results = null;
      try { results = await api('GET', `/api/poll/results?pollId=${p.pollId}`); } catch {}

      const options = (results?.options || p.options).map(o => {
        const total = results?.totalVotes || 1;
        const pct = results ? Math.round((o.votes / Math.max(total, 1)) * 100) : 0;
        return `<div class="poll-option" onclick="doVote('${p.pollId}', ${o.index})">
          <span>${esc(o.text)}</span>
          <span style="margin-left:auto; font-size:12px; color:var(--text2)">${results ? o.votes + '票 ' + pct + '%' : ''}</span>
        </div>
        ${results ? `<div style="margin: 0 10px 4px"><div class="poll-bar" style="width:${pct}%"></div></div>` : ''}`;
      }).join('');

      const statusColor = p.status === 'active' ? 'var(--green)' : p.status === 'draft' ? 'var(--yellow)' : 'var(--text2)';
      html += `<div class="poll-card">
        <h4>📊 ${esc(p.question)}</h4>
        <div class="poll-meta">by ${esc(p.creatorName)} · <span style="color:${statusColor}">${p.status}</span> · ${p.totalVotes}票</div>
        ${p.status === 'active' ? options : '<div style="color:var(--text2); font-size:13px; margin-top:8px;">已结束</div>'}
      </div>`;
    }
    el.innerHTML = html;
  } catch (e) {
    console.error('loadPolls:', e);
  }
}

async function doVote(pollId, optionIndex) {
  try {
    await api('POST', '/api/action', { token: TOKEN, action: 'vote', pollId, optionIndex });
    showToast('🗳️ 已投票');
    loadPolls();
  } catch (e) {
    showToast('❌ ' + (e.message || '投票失败'));
  }
}

// ─── Create Poll ─────────────────────────────────
function showCreatePoll() {
  POLL_DRAFT_ID = null;
  document.getElementById('poll-question').value = '';
  document.getElementById('poll-options-edit').innerHTML = '';
  document.getElementById('poll-confirm-btn').style.display = 'none';
  document.getElementById('poll-modal').style.display = 'flex';
}

function closePollModal() {
  document.getElementById('poll-modal').style.display = 'none';
}

async function generatePollOptions() {
  const q = document.getElementById('poll-question').value.trim();
  if (!q) return showToast('请输入投票问题');
  try {
    const r = await api('POST', '/api/poll/create', { token: TOKEN, question: q });
    POLL_DRAFT_ID = r.pollId;
    const el = document.getElementById('poll-options-edit');
    el.innerHTML = r.options.map((o, i) =>
      `<input class="poll-opt-input" value="${esc(o.text)}" style="width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; margin-bottom:6px;">`
    ).join('') + `<button class="btn btn-small" onclick="addPollOption()" style="margin-top:4px;">+ 添加选项</button>`;
    document.getElementById('poll-confirm-btn').style.display = 'inline-block';
  } catch (e) {
    showToast('❌ ' + (e.message || '生成失败'));
  }
}

function addPollOption() {
  const el = document.getElementById('poll-options-edit');
  const btn = el.querySelector('button');
  const input = document.createElement('input');
  input.className = 'poll-opt-input';
  input.style = 'width:100%; padding:8px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; margin-bottom:6px;';
  input.placeholder = '新选项';
  el.insertBefore(input, btn);
}

async function confirmPoll() {
  if (!POLL_DRAFT_ID) return;
  const options = [...document.querySelectorAll('.poll-opt-input')].map(i => i.value.trim()).filter(v => v);
  if (options.length < 2) return showToast('至少需要2个选项');
  const q = document.getElementById('poll-question').value.trim();
  try {
    await api('POST', '/api/poll/confirm', { token: TOKEN, pollId: POLL_DRAFT_ID, question: q || undefined, options });
    closePollModal();
    loadPolls();
    showToast('📊 投票已发布');
  } catch (e) {
    showToast('❌ ' + (e.message || '发布失败'));
  }
}

// ─── Tab Switch ──────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-polls').style.display = tab === 'polls' ? 'block' : 'none';
  document.getElementById('tab-groups').style.display = tab === 'groups' ? 'block' : 'none';
  if (tab === 'groups') loadGroups();
}

// ─── Groups ──────────────────────────────────────
let CURRENT_GROUP = null;

async function loadGroups() {
  try {
    const r = await api('GET', `/api/groups?token=${TOKEN}`);
    const el = document.getElementById('group-list');
    const groups = r.groups || [];
    if (groups.length === 0) {
      el.innerHTML = '<p style="color:var(--text2); font-size:13px;">暂无群聊。通过发帖创建群组吧！</p>';
      return;
    }
    el.innerHTML = groups.map(g =>
      `<div class="group-item" onclick="openGroupChat(${g.groupId}, '${esc(g.name)}')">
        <div style="font-weight:600;">💬 ${esc(g.name)}</div>
        <div style="font-size:12px; color:var(--text2);">ID: ${g.groupId}</div>
      </div>`
    ).join('');
  } catch (e) {
    console.error('loadGroups:', e);
  }
}

async function openGroupChat(groupId, name) {
  CURRENT_GROUP = groupId;
  document.getElementById('group-list').style.display = 'none';
  document.getElementById('group-chat').style.display = 'block';
  document.getElementById('group-chat-name').textContent = name;
  await loadGroupMessages(groupId);
}

function closeGroupChat() {
  CURRENT_GROUP = null;
  document.getElementById('group-list').style.display = 'block';
  document.getElementById('group-chat').style.display = 'none';
}

async function loadGroupMessages(groupId) {
  try {
    const r = await api('GET', `/api/group/messages?groupId=${groupId}&limit=30`);
    const el = document.getElementById('group-messages');
    const msgs = r.messages || [];
    if (msgs.length === 0) {
      el.innerHTML = '<p style="color:var(--text2); font-size:13px;">暂无消息</p>';
      return;
    }
    el.innerHTML = msgs.map(m =>
      `<div class="group-msg"><span class="sender">${esc(m.sender_name)}</span>: ${esc(m.content)}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  } catch (e) {
    console.error('loadGroupMessages:', e);
  }
}

async function sendGroupMsg() {
  if (!CURRENT_GROUP) return;
  const input = document.getElementById('group-msg-input');
  const content = input.value.trim();
  if (!content) return;
  try {
    await api('POST', '/api/action', { token: TOKEN, action: 'send_to_group', groupId: CURRENT_GROUP, content });
    input.value = '';
    showToast('✅ 已发送');
    setTimeout(() => loadGroupMessages(CURRENT_GROUP), 500);
  } catch (e) {
    showToast('❌ ' + (e.message || '发送失败'));
  }
}

// ─── Polling (HTTP long-poll for events) ─────────
function startPolling() {
  setInterval(async () => {
    try {
      const r = await api('GET', `/api/poll?token=${TOKEN}&timeout=5000`);
      for (const ev of (r.events || [])) {
        handleWSMessage({ type: 'event', event: ev.type, data: ev.data, ...ev });
      }
    } catch {}
  }, 6000);

  // Refresh agents + notifications + group messages periodically
  setInterval(loadAgents, 30000);
  setInterval(loadNotifications, 15000);
  setInterval(() => { if (CURRENT_GROUP) loadGroupMessages(CURRENT_GROUP); }, 10000);

  // Enter key for group chat input
  document.getElementById('group-msg-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendGroupMsg();
  });

  // Refresh state
  setInterval(loadState, 10000);
}

async function loadState() {
  try {
    const r = await api('GET', '/api/state');
    const round = r.state?.round ?? r.round;
    if (round != null) document.getElementById('round-badge').textContent = `Round ${round}`;
  } catch {}
}

// ─── Utils ───────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(BASE + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function addEvent(msg, cls) {
  const el = document.getElementById('events');
  const div = document.createElement('div');
  div.className = 'event-item' + (cls ? ` ${cls}` : '');
  div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
  el.prepend(div);
  if (el.children.length > 50) el.lastChild.remove();
}
